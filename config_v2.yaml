        如果可以继续，请严格先输出下面这一行，不要加任何 Markdown 修饰：
        OPENCLAW_STATUS: ready

        请输出：
        1. 主要风险
        2. 建议补充验证
        3. 是否建议发布到 GitHub 流程

    - id: publish_branch
      title: Publish implementation branch to origin
      assignment: publish_branch_local
      depends_on:
        - implement
        - review
      metadata:
        export_branch: true
        requires_origin_remote: true
        requires_workspace_changes: true
      prompt_template: |
        将当前实现分支推送到 origin，供 GitHub PR 和 workflow 使用。
        工作目录：{workspace_path}
        分支名：{branch_name}

        用户请求：
        {user_request}

        来源分支：
        {source_branch}

    - id: sync_issue
      title: Sync planning issue to GitHub
      assignment: sync_issue_bridge
      depends_on:
        - triage
      prompt_template: |
        请把以下任务分析整理成 GitHub issue，便于异步跟踪。

        用户请求：
        {user_request}

        {dependency_summaries}

    - id: update_issue
      title: Update GitHub issue with implementation status
      assignment: update_issue_bridge
      depends_on:
        - publish_branch
        - review
        - sync_issue
      metadata:
        allow_noop_skipped_dependencies:
          - publish_branch
      prompt_template: |
        请把本地实现结果回写到现有 GitHub issue，作为阶段性进展更新。

        用户请求：
        {user_request}

        当前实现分支：
        {primary_branch_name}

        目标 issue：
        {primary_issue_ref}

        {dependency_summaries}

    - id: draft_pr
      title: Prepare GitHub draft PR summary
      assignment: draft_pr_bridge
      depends_on:
        - publish_branch
        - review
        - sync_issue
        - update_issue
      prompt_template: |
        请把本地实现结果整理为 Draft PR 描述，便于后续人工审核和合并。

        用户请求：
        {user_request}

        {dependency_summaries}

        建议使用的实现分支：
        {primary_branch_name}

    - id: dispatch_review
      title: Trigger GitHub review workflow
      assignment: dispatch_review_bridge
      depends_on:
        - publish_branch
        - review
        - draft_pr
      prompt_template: |
        请触发 GitHub review workflow，对以下实现分支执行异步检查。

        用户请求：
        {user_request}

        推荐分支：
        {primary_branch_name}

        {dependency_summaries}

    - id: collect_review
      title: Collect GitHub review workflow status
      assignment: collect_review_bridge
      depends_on:
        - dispatch_review
      prompt_template: |
        请收集当前 GitHub review workflow 的最新状态，便于 OpenClaw 回流异步检查结果。

        用户请求：
        {user_request}

        目标 workflow run：
        {primary_workflow_run_ref}

        {dependency_summaries}

  github_bridge_smoke:
    - id: dispatch_review
      title: Trigger GitHub review workflow smoke test
      assignment: dispatch_review_bridge
      prompt_template: |
        请触发 GitHub review workflow 的最小 smoke test，用于单独验证 GitHub bridge 是否可用。

        用户请求：
        {user_request}

        如果当前没有实现分支，请直接使用默认基线分支。

    - id: collect_review
      title: Collect GitHub review workflow smoke status
      assignment: collect_review_bridge
      depends_on:
        - dispatch_review
      prompt_template: |
        请收集刚刚触发的 GitHub review workflow smoke test 的最新状态。

        用户请求：
        {user_request}

        目标 workflow run：
        {primary_workflow_run_ref}

        {dependency_summaries}
